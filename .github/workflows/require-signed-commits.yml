name: Require signed commits

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-signed-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Check commit signatures
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/commits" \
            --jq '.[] | select(.commit.verification.verified != true) | "\(.sha) \(.commit.verification.reason)"' > unsigned.txt

          if [ -s unsigned.txt ]; then
            echo "Unsigned or unverified commits found:"
            cat unsigned.txt
            exit 1
          fi

          echo "All commits are signed and verified."
